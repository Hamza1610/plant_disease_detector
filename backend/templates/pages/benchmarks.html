{% extends "base.html" %}
{% block title %}Benchmarks | Tiki Tice Omniverse{% endblock %}
{% block content %}
<section class="page-head"><h1>Benchmark Center</h1><p>Run and compare model performance over time.</p></section>
<section class="panel toolbar">
  <select id="benchmarkModelSelect"></select>
  <input id="manifestPathInput" placeholder="Optional manifest path" value="" />
  <button id="runBenchmarkBtn" class="btn primary">Run Benchmark</button>
  <button id="refreshBenchmarksBtn" class="btn">Refresh</button>
</section>
<section class="panel"><pre id="benchmarkOutput">Benchmark history will appear here.</pre></section>
{% endblock %}
{% block scripts %}<script>window.PAGE_TYPE='benchmarks';</script>{% endblock %}
