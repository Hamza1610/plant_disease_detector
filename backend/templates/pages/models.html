{% extends "base.html" %}
{% block title %}Models | Tiki Tice Omniverse{% endblock %}
{% block content %}
<section class="page-head">
  <h1>Model Catalog</h1>
  <p>Search and filter by plant, disease, tags, and model tier.</p>
</section>

<section class="toolbar panel">
  <input id="searchInput" placeholder="Search models..." />
  <input id="tagFilter" placeholder="Tags: tomato, classification" />
  <input id="plantFilter" placeholder="Plant" />
  <input id="diseaseFilter" placeholder="Disease" />
  <select id="tierFilter">
    <option value="">All tiers</option>
    <option value="free">Free</option>
    <option value="pro">Pro</option>
    <option value="enterprise">Enterprise</option>
  </select>
  <button id="searchBtn" class="btn primary">Search</button>
  <button id="filterBtn" class="btn">Filter</button>
</section>

<section id="modelList" class="catalog-grid"></section>
{% endblock %}
{% block scripts %}<script>window.PAGE_TYPE='models';</script>{% endblock %}
