<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Tiki Tice Omniverse{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/main.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">Tiki Tice Omniverse</a>
      <nav class="site-nav">
        <a href="/">Home</a>
        <a href="/app/models">Models</a>
        <a href="/app/predict">Predict</a>
        <a href="/app/benchmarks">Benchmarks</a>
        <a href="/app/pricing">Pricing</a>
      </nav>
      <button class="cta-btn">Join Pilot</button>
    </header>

    <main class="page-wrap">{% block content %}{% endblock %}</main>

    <footer class="site-footer">
      <p>Built for scalable plant intelligence and model commerce.</p>
    </footer>
    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
